spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: https://github.com/namancristvats/config-server.git
          username: ${GITHUB_USERNAME}
          password: ${GITHUB_TOKEN}
          default-label: main
server:
  port: 8888

eureka:
  client:
    service-url:
        defaultZone: http://localhost:8761/eureka/
